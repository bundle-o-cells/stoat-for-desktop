name: Publish Manual

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout assets
        run: git -c submodule."assets".update=checkout submodule update --init assets

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Confirm secret is plumbed
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        run: |
          if [ -z "${VITE_SERVER_URL}" ]; then
            echo "::error::VITE_SERVER_URL is empty"
            exit 1
          fi
          echo "VITE_SERVER_URL length: ${#VITE_SERVER_URL}"
        shell: bash
      
      - name: Publish
        run: pnpm run publish
        env:
          PLATFORM: ${{ matrix.os }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

      
